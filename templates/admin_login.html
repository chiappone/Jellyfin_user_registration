<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0b;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            margin: 20px;
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #fff; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: #00a4dc; }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #00a4dc;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #00b6f0; }
        .error {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            background: #2e0a0a;
            border: 1px solid #7f1d1d;
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Login</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
